# Inference-only config for the DoMINO design-sensitivities workflow.
#
# Model architecture and weights live in the `.mdlus` checkpoint, and
# the per-field unnormalization factors live in `scaling_factors.pkl`
# alongside it. The only things still configured here are the spatial
# bounds that the datapipe uses to crop and normalize the input
# geometry. These should match the training-time bounds of your
# checkpoint (see the `config.yaml` shipped with the HF checkpoint
# bundle).

data:
  # Computational-domain (volume) bounding box.
  bounding_box:
    min: [-3.5, -2.25, -0.32]
    max: [ 8.5,  2.25,  3.00]
  # Surface bounding box (tighter, around the vehicle itself).
  bounding_box_surface:
    min: [-1.5, -1.4, -0.32]
    max: [ 5.0,  1.4,  1.4 ]

# Surface output channel layout. Kept here only as user-facing
# documentation: it does not affect model construction (the checkpoint
# carries its own output dimensions) but it tells you what each column
# of `pred_surf_*` corresponds to. Order must match the order the model
# was trained with.
variables:
  surface:
    solution:
      pMeanTrim: scalar              # column 0:    static pressure
      wallShearStressMeanTrim: vector # columns 1-3: wall shear stress
