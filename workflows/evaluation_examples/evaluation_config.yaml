# Single evaluation config: metrics, tabular reports (JSON/CSV/HTML), optional PNG visuals, optional VTK.
# Run: python -m physicsnemo.cfd.evaluation.benchmarks.run --config evaluation_config.yaml [--case-id run_1]
#
# benchmark.mode: "single" — uses top-level `model` and `dataset` below (one model × one dataset).
# benchmark.mode: "matrix" — uses `benchmark.models` × `benchmark.datasets` (Cartesian product). See the
# commented template at the bottom of this file; merge those keys into `benchmark` and set mode: matrix.

run:
  device: "cuda:0"
  output_dir: "benchmark_results"
  seed: 42
  batch_size: 1
  save_inference_mesh: false  # false = skip writing inference_<model>_<case>.vtp|vtu

# Default model (template for matrix rows when `benchmark.mode: matrix`; ignored as a pair when using lists).
# Smoke tests: model.name surface_baseline or volume_baseline, checkpoint/stats_path "", matching dataset domain.
# GeoTransolver/Transolver volume: inference_domain: volume; global_stats.json (velocity, pressure_volume, turbulent_viscosity) or volume_fields_normalization.npz next to checkpoint
# (same layout as transformer_models training / inference_on_vtk.py).
benchmark:
  mode: "matrix"
  models:
    - name: "geotransolver"
      inference_domain: surface
      checkpoint: "/lustre/fsw/coreai_modulus_cae/rranade/modulus_dev/modulus_forked/ktangsali/physicsnemo-external-aero-checkpoints/benchmark_models/geotransolver_drivaerml_surface_checkpoint/checkpoint.0.501.pt"
      stats_path: "/lustre/fsw/coreai_modulus_cae/rranade/modulus_dev/modulus_forked/ktangsali/physicsnemo-external-aero-checkpoints/benchmark_models/geotransolver_drivaerml_surface_checkpoint/global_stats.json"
      kwargs: {"batch_resolution": 60000, "geometry_sampling": 300000}
  datasets:
    - name: "drivaerml"
      root: "/lustre/fsw/coreai_modulus_cae/datasets/drivaer_aws/drivaer_data_finetune"
      split: null
      case_ids: ["run_1", "run_11"]
      kwargs: {align_ground_truth_to_model: true, inference_domain: surface}
  reproducibility:
    log_env: true
    save_artifacts: true

output:
  mesh_field_names:
    pressure: "pMeanTrimPred"
    shear_stress: "wallShearStressMeanTrimPred"
  # Written on volume runs (defaults include pressure_volume → pMeanPred, etc.)
  volume_mesh_field_names:
    pressure_volume: "pMeanTrimPred"
    turbulent_viscosity: "nutMeanTrimPred"
    velocity: "UMeanTrimPred"

# Surface: l2_pressure, l2_shear_stress, l2_velocity, drag_error, lift_error
# Volume: l2_pressure_volume (pressure_volume), l2_turbulent_viscosity, l2_velocity
# Optional dict form for renamed keys: { name: l2_turbulent_viscosity, gt_key: turbulent_viscosity, pred_key: turbulent_viscosity }
metrics:
  - l2_pressure
  - l2_shear_stress
  - l2_pressure_area_weighted   # alias: area_wt_l2_pressure
  - drag_error
  - lift_error
  # Surface (VTP): l2_pressure, l2_shear_stress
  # - "l2_pressure_volume"
  # - "l2_turbulent_viscosity"
  # - "l2_velocity"

# Optional PNGs: builds GT+pred comparison mesh in memory; VTK on disk only if save_comparison_meshes: true.
# Built-ins: field_comparison_surface | plot_fields_volume | line_plot | line_plot_centerlines (bench-style
#   top/bottom surface strips) | design_scatter | design_trend | projections_hexbin | streamlines_comparison
reports:
  enabled: true
  save_comparison_meshes: false
  comparison_mesh_subdir: comparison_meshes
  # Retain in-memory comparison meshes only for these cases (saves RAM on large sweeps). Also the
  # default ``case_ids`` for any visual that omits ``case_ids`` (per-visual ``case_ids`` overrides).
  visual_case_ids: ["run_1", "run_11"]
  visuals:
    - name: field_comparison_surface
      canonical_keys: [pressure, shear_stress]
      view: xy
    # Surface comparison mesh (cell centers); shear_stress line uses |tau_w| vs plot_coord.
    - name: line_plot
      canonical_key: pressure
      plot_coord: x
      normalize_factor: 1.0
      true_line_kwargs: { label: Ground truth }
      pred_line_kwargs: { label: Prediction }
    - name: line_plot
      canonical_key: shear_stress
      plot_coord: x
      normalize_factor: 1.0
      true_line_kwargs: { label: Ground truth }
      pred_line_kwargs: { label: Prediction }
    # Top/bottom centerline strips (same y-slice + z-clip as workflows/bench_example generate_surface_benchmarks).
    # Writes two PNGs per case: *_line_centerline_top_* and *_line_centerline_bottom_*.
    - name: line_plot_centerlines
      canonical_key: pressure
      plot_coord: x
      normalize_factor: 1.0
      z_clip: 0.4
      y_slice_origin: [0, 0, 0]
      xlabel: "X Coordinate"
      ylabel: "Pressure"
      true_line_kwargs: { label: Ground truth }
      pred_line_kwargs: { label: Prediction }
    # streamlines_comparison: volume uses velocity maps; surface (cell) uses canonical_key (e.g. shear_stress).
    - name: streamlines_comparison
      canonical_key: shear_stress
      view: xy
    # --- drag_error / lift_error populate drag_error_true|pred (Cd) and lift_error_true|pred (Cl) ---
    - name: design_scatter
      pairs:
        - { name: Cd, true_key: drag_error_true, pred_key: drag_error_pred }
        - { name: Cl, true_key: lift_error_true, pred_key: lift_error_pred }
    - name: design_trend
      pairs:
        - { name: Cd, true_key: drag_error_true, pred_key: drag_error_pred }
        - { name: Cl, true_key: lift_error_true, pred_key: lift_error_pred }
    # - name: projections_hexbin
    #   mesh_paths: ["/abs/path/to/proj1.vtp"]
    #   field: p_error
    #   direction: XY


