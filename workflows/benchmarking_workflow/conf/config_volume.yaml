# Volume benchmark (VTU / point metrics, volume fields, PDE residuals, velocity streamlines).
# Run: ``python main.py --config-name=config_volume``

defaults:
  - _self_

hydra:
  run:
    dir: ${run.output_dir}
  output_subdir: hydra
  job:
    chdir: false

# Top-level: one id, list (shared by all matrix datasets), or null for per-dataset case_ids / all cases.
case_id: null

run:
  device: "cuda:0"
  output_dir: "benchmark_results_volume"
  seed: 42
  batch_size: 1
  save_inference_mesh: false
  metrics_cache:
    enabled: true
    path: ${run.output_dir}/metrics_cache

benchmark:
  mode: "matrix"
  models:
    - name: "geotransolver_volume"
      inference_domain: volume
      checkpoint: "/lustre/fsw/coreai_modulus_cae/rranade/modulus_dev/modulus_forked/ktangsali/physicsnemo-external-aero-checkpoints/benchmark_models/geotransolver_drivaerml_volume_checkpoint/checkpoint.0.501.pt"
      stats_path: "/lustre/fsw/coreai_modulus_cae/rranade/modulus_dev/modulus_forked/ktangsali/physicsnemo-external-aero-checkpoints/benchmark_models/geotransolver_drivaerml_volume_checkpoint/global_stats.json"
      kwargs: { batch_resolution: 60000, geometry_sampling: 300000 }
  datasets:
    - name: "drivaerml"
      root: "/lustre/fsw/coreai_modulus_cae/datasets/drivaer_aws/drivaer_data_finetune"
      kwargs: { align_ground_truth_to_model: true, inference_domain: volume }
  # When true: writes full os.environ → env.json (may leak HF/AWS tokens). Prefer false for shared runs.
  reproducibility:
    log_env: false
    save_artifacts: false

output:
  volume_mesh_field_names:
    pressure: "pMeanTrimPred"
    turbulent_viscosity: "nutMeanTrimPred"
    velocity: "UMeanTrimPred"
  ground_truth_volume_mesh_field_names:
    pressure: "pMeanTrim"
    turbulent_viscosity: "nutMeanTrim"
    velocity: "UMeanTrim"
  streamlines_vector_canonical: velocity

metrics:
  # drag / lift omitted: surface-only metrics (evaluation/metrics/builtin/forces.py). Do not add for volume.
  - l2_pressure
  - l2_turbulent_viscosity
  - l2_velocity
  - continuity_residual_l2
  - momentum_residual_l2

reports:
  enabled: false
  save_comparison_meshes: false
  comparison_mesh_subdir: comparison_meshes
  visual_case_ids: [run_1, run_11]
  visuals:
    # Omit ``fields`` to plot all ``output.volume_mesh_field_names`` arrays on the comparison mesh.
    - name: plot_fields_volume
      view: xy
    - name: line_plot
      canonical_key: pressure
      plot_coord: x
      normalize_factor: 1.0
      true_line_kwargs: { label: Ground truth }
      pred_line_kwargs: { label: Prediction }
    # Volume point mesh: uses ``output.streamlines_vector_canonical`` (velocity) when omitted.
    - name: streamlines_comparison
      view: xy
    - name: aggregate_volume_errors
      # Optional: fixed ROI; omit bounds to use union of comparison mesh extents instead.
      bounds: [-3.5, 8.5, -2.25, 2.25, -0.32, 3.00]
      voxel_size: 0.03
      canonical_keys: ["pressure", "velocity", "turbulent_viscosity"]
