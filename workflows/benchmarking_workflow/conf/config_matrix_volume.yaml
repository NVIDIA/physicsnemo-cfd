# Matrix volume benchmark: every ``benchmark.models`` entry × every ``benchmark.datasets`` entry.
#
# Run:
#   python main.py --config-name=config_matrix_volume

# When ``checkpoint`` and ``stats_path`` are both set, they override built-in ``hf://`` defaults
# (per-model roots in ``builtin_packages``: ``GEOTRANSOLVER_PACKAGE_ROOT``, etc.). Omit those keys to download from Hub instead.
# DoMINO: omit ``checkpoint`` / ``stats_path`` / ``domino_config`` to pull weights + ``config.yaml`` from Hub
# (see ``builtin_packages``); set any of them to override.
# Uncomment or add more models (registered names: ``*_surface`` / ``*_volume`` for GeoTransolver /
# Transolver / DoMINO; ``xmgn``, ``fignet``, …).

defaults:
  - _self_

hydra:
  run:
    dir: ${run.output_dir}
  output_subdir: hydra
  job:
    chdir: false

case_id: null

run:
  device: "cuda:0"
  output_dir: "benchmark_results_matrix_volume"
  seed: 42
  batch_size: 1
  save_inference_mesh: false
  metrics_cache:
    enabled: true
    path: ${run.output_dir}/metrics_cache

benchmark:
  mode: matrix
  models:
    - name: geotransolver_volume
      inference_domain: volume
      checkpoint: "/lustre/fsw/coreai_modulus_cae/rranade/modulus_dev/modulus_forked/ktangsali/physicsnemo-external-aero-checkpoints/benchmark_models/geotransolver_drivaerml_volume_checkpoint/checkpoint.0.501.pt"
      stats_path: "/lustre/fsw/coreai_modulus_cae/rranade/modulus_dev/modulus_forked/ktangsali/physicsnemo-external-aero-checkpoints/benchmark_models/geotransolver_drivaerml_volume_checkpoint/global_stats.json"
      kwargs: { batch_resolution: 60000, geometry_sampling: 300000 }
    - name: transolver_volume
      inference_domain: volume
      checkpoint: "/lustre/fsw/coreai_modulus_cae/rranade/modulus_dev/modulus_forked/ktangsali/physicsnemo-external-aero-checkpoints/benchmark_models/transolver_drivaerml_volume_checkpoint/checkpoint.0.501.pt"
      stats_path: "/lustre/fsw/coreai_modulus_cae/rranade/modulus_dev/modulus_forked/ktangsali/physicsnemo-external-aero-checkpoints/benchmark_models/transolver_drivaerml_volume_checkpoint/global_stats.json"
      kwargs: { batch_resolution: 60000, geometry_sampling: 300000 }
    - name: domino_volume
      inference_domain: volume
      checkpoint: "/lustre/fsw/coreai_modulus_cae/rranade/modulus_dev/modulus_forked/ktangsali/physicsnemo-external-aero-checkpoints/benchmark_models/domino_drivaerml_volume_checkpoint/checkpoint.0.501.pt"
      stats_path: "/lustre/fsw/coreai_modulus_cae/rranade/modulus_dev/modulus_forked/ktangsali/physicsnemo-external-aero-checkpoints/benchmark_models/domino_drivaerml_volume_checkpoint/global_stats.json"
      kwargs: { "domino_config": "/lustre/fsw/coreai_modulus_cae/rranade/modulus_dev/modulus_forked/ktangsali/physicsnemo-external-aero-checkpoints/benchmark_models/domino_drivaerml_volume_checkpoint/config.yaml" }
    # Uncomment when you have your custom model volume checkpoint + stats next to it (same layout as training).
    # - name: volume_baseline_model
    #   inference_domain: volume
    #   checkpoint: "/path/to/volume_baseline_model/checkpoint.0.501.pt"
    #   stats_path: "/path/to/volume_baseline_model/global_stats.json"
    #   kwargs: { }
  datasets:
    - name: drivaerml
      root: "/lustre/fsw/coreai_modulus_cae/datasets/drivaer_aws/drivaer_data_finetune"
      kwargs: { align_ground_truth_to_model: true, inference_domain: volume }
  # When true: writes full os.environ → env.json (may leak HF/AWS tokens). Prefer false for shared runs.
  reproducibility:
    log_env: false
    save_artifacts: false

output:
  volume_mesh_field_names:
    pressure: "pMeanTrimPred"
    turbulent_viscosity: "nutMeanTrimPred"
    velocity: "UMeanTrimPred"
  ground_truth_volume_mesh_field_names:
    pressure: "pMeanTrim"
    turbulent_viscosity: "nutMeanTrim"
    velocity: "UMeanTrim"
  streamlines_vector_canonical: velocity

metrics:
  # drag / lift omitted: registered only for domain=surface (forces.py). Listing them with
  # inference_domain: volume causes KeyError in get_metric(...) → swallowed as NaNs.
  - l2_pressure
  - l2_turbulent_viscosity
  - l2_velocity
  - continuity_residual_l2
  - momentum_residual_l2

reports:
  enabled: false
  save_comparison_meshes: false
  comparison_mesh_subdir: comparison_meshes
  visual_case_ids: [run_1, run_11]
  visuals: []
