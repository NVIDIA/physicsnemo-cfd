#
# Matrix volume benchmark using HF-hosted checkpoints (GeoTransolver, Transolver, DoMINO).
# Same structure as ``config_matrix_volume.yaml`` but checkpoints resolve from Hub via
# ``builtin_packages`` — omit ``checkpoint`` / ``stats_path`` / ``domino_config`` kwargs when using defaults.
#
# Reports/visuals mirror ``config_volume.yaml`` with ``reports.enabled: true``.
#
# XMGN / FIGConvNet have no volume checkpoints on Hub — omit them here.
#
# Run:
#   python main.py --config-name=config_matrix_volume_hf
#
# Requires: huggingface-cli login (or HF_TOKEN) when pulling private artifacts.

defaults:
  - _self_

hydra:
  run:
    dir: ${run.output_dir}
  output_subdir: hydra
  job:
    chdir: false

case_id: [run_1, run_11]

run:
  device: "cuda:0"
  output_dir: "benchmark_results_matrix_volume_hf"
  seed: 42
  batch_size: 1
  save_inference_mesh: false
  metrics_cache:
    enabled: true
    path: ${run.output_dir}/metrics_cache

benchmark:
  mode: matrix
  models:
    - name: domino_volume
      inference_domain: volume
      kwargs: {}
    - name: geotransolver_volume
      inference_domain: volume
      kwargs: { batch_resolution: 60000, geometry_sampling: 300000 }
    - name: transolver_volume
      inference_domain: volume
      kwargs: { batch_resolution: 60000, geometry_sampling: 300000 }
  datasets:
    - name: drivaerml
      root: "/code/drivaerml"
      split: null
      kwargs: { align_ground_truth_to_model: true, inference_domain: volume }
  reproducibility:
    log_env: true
    save_artifacts: true

output:
  volume_mesh_field_names:
    pressure: "pMeanTrimPred"
    turbulent_viscosity: "nutMeanTrimPred"
    velocity: "UMeanTrimPred"
  ground_truth_volume_mesh_field_names:
    pressure: "pMeanTrim"
    turbulent_viscosity: "nutMeanTrim"
    velocity: "UMeanTrim"
  streamlines_vector_canonical: velocity

# Matches ``config_matrix_volume.yaml`` field metrics; omit ``drag`` / ``lift`` (surface-domain metrics).
metrics:
  - l2_pressure
  - l2_turbulent_viscosity
  - l2_velocity


# Reports/visuals aligned with ``config_volume.yaml``; ``reports.enabled: true``.
reports:
  enabled: true
  save_comparison_meshes: false
  comparison_mesh_subdir: comparison_meshes
  visual_case_ids: [run_1, run_11]
  visuals:
    - name: plot_fields_volume
      view: xy
    - name: line_plot
      canonical_key: pressure
      plot_coord: x
      normalize_factor: 1.0
      true_line_kwargs: { label: Ground truth }
      pred_line_kwargs: { label: Prediction }
    - name: streamlines_comparison
      view: xy
    - name: aggregate_volume_errors
      bounds: [-3.5, 8.5, -2.25, 2.25, -0.32, 3.00]
      voxel_size: 0.03
      canonical_keys: ["pressure", "velocity", "turbulent_viscosity"]
