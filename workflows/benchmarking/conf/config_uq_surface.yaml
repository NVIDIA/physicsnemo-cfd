# ============================================================================
# EXAMPLE: probabilistic / uncertainty-quantification (UQ) surface benchmark.
#
# It scores four models on the SAME cases so you can read the pooled UQ metrics
# (NLPD, calibration z-RMS, 95% coverage, sharpness, sparsification/AUSE)
# alongside the usual accuracy metrics (L2 / drag / lift). The four rows cover
# every path in the UQ engine and act as the reference examples for the three
# UQ wrapper archetypes:
#
#   * geotransolver_drivaerstar_surface     -> deterministic (SUPPORTS_UQ=False).
#         UQ metrics finalize to NaN; included for the det-vs-UQ contrast.
#   * geotransolver_gp_surface              -> UQ_METHOD="analytic" (GP field head):
#         one forward pass returns the posterior; decode_distribution() emits
#         mean + total/epistemic std.
#   * geotransolver_mc_dropout_surface      -> UQ_METHOD="sampling" (one model, N
#         stochastic passes): the engine runs run.uq.num_samples passes and
#         aggregates them (Welford).
#   * geotransolver_ensemble_surface        -> UQ_METHOD="sampling" (K models, one
#         pass each): predict_ensemble() returns one output per member.
#
# ----------------------------------------------------------------------------
# BEFORE RUNNING: edit the paths in the `_paths` block and `benchmark.datasets`
# below to point at your own checkpoints / stats / data. They are placeholders
# (``/path/to/...``); nothing here is machine-specific.
#
# Run (on a GPU node):
#   python main.py --config-name=config_uq_surface
#   torchrun --standalone --nnodes=1 --nproc_per_node=8 main.py --config-name=config_uq_surface
# ============================================================================

defaults:
  - _self_

hydra:
  run:
    dir: ${run.output_dir}
  output_subdir: hydra
  job:
    chdir: false

case_id: null

run:
  device: "cuda:0"
  output_dir: "benchmark_results_uq_surface"
  seed: 42
  batch_size: 1
  # Write per-case .vtp with Pred/Std/EpistemicStd arrays for ParaView spatial-UQ inspection.
  save_inference_mesh: true
  metrics_cache:
    enabled: true
    path: ${run.output_dir}/metrics_cache
  # ---- Uncertainty-quantification controls (additive; default off) ----
  uq:
    enabled: true
    # Stochastic passes per case for UQ_METHOD="sampling" wrappers. Ignored by analytic /
    # deterministic rows, and by the ensemble (its pass count is its number of members).
    num_samples: 32
    # Keep the raw per-pass samples on the FieldDistribution (memory-heavy; only for CRPS / debugging).
    retain_samples: false
    device_metrics: false

# ---- Edit these to your environment --------------------------------------
# All checkpoints below are assumed to share ONE surface-normalization file. The GP / MC-Dropout /
# ensemble rows all decorate the same GeoTransolver backbone family (physical, standardize-only
# targets), so they reuse the same stats.
_paths:
  surface_stats: &surface_stats /path/to/surface_fields_normalization.npz
  # Deterministic + ensemble members come from a standard training run. Point these at the
  # MODEL-weights file physicsnemo writes per saved epoch (``GeoTransolver.0.<epoch>.mdlus``),
  # NOT the ``checkpoint.0.<epoch>.pt`` training-state file — the wrapper loads the exact file
  # named here (and raises if it is missing), so an epoch's `.mdlus` is what you want.
  baseline_ckpt: &baseline_ckpt /path/to/run/checkpoints/GeoTransolver.0.100.mdlus
  # A backbone trained with Concrete-Dropout (model.concrete_dropout=true) for the MC-Dropout row.
  concrete_dropout_ckpt: &concrete_dropout_ckpt /path/to/run_concrete_dropout/checkpoints/GeoTransolver.0.100.mdlus

benchmark:
  mode: matrix
  models:
    # (1) Deterministic baseline. SUPPORTS_UQ=False -> UQ metrics report NaN.
    - name: geotransolver_drivaerstar_surface
      inference_domain: surface
      checkpoint: *baseline_ckpt
      stats_path: *surface_stats
      kwargs: { batch_resolution: 60000, geometry_sampling: 300000 }

    # (2) Analytic GP field head. This wrapper loads TWO checkpoints, both named
    # explicitly: `checkpoint` is the GeoTransolver backbone (epoch parsed from the file name) and
    # `gp_head_checkpoint` is the matching FieldGPHead (read as given; pass matching files). The GP
    # hyperparameters here MUST match the training run so the FieldGPHead reconstructs before the
    # state dict loads.

    - name: geotransolver_gp_surface
      inference_domain: surface
      checkpoint: /path/to/run_field_gp_due/checkpoints_field_gp/GeoTransolver.0.100.mdlus
      stats_path: *surface_stats
      kwargs:
        gp_head_checkpoint: /path/to/run_field_gp_due/checkpoints_field_gp/FieldGPHead.0.100.pt
        gp_feature_norm: "l2_radial"
        gp_n_inducing: 1024
        gp_mlp_hidden: [128, 128, 16]
        gp_spectral_norm_coeff: 0.95      # > 0 -> DUE bi-Lipschitz extractor
        gp_dkl_residual: true
        gp_lengthscale_range: [0.01, 2.0]
        gp_lengthscale_prior: [2.0, 3.0]
        gp_outputscale_prior: [2.0, 0.5]
        num_tasks: 4
        gp_inference_chunk_size: 51200
        geometry_sampling: 300000

    # (3) MC-Dropout: run.uq.num_samples stochastic passes over the Concrete-Dropout backbone
    # (the ConcreteDropout layers stay stochastic at inference).
    - name: geotransolver_mc_dropout_surface
      inference_domain: surface
      checkpoint: *concrete_dropout_ckpt
      stats_path: *surface_stats
      kwargs:
        batch_resolution: 60000
        geometry_sampling: 300000

    # (4) K-member ensemble: one pass per member. List the member checkpoints explicitly (from a
    # single run = snapshot ensemble, or from separate runs = true deep ensemble; same code path).
    # `checkpoint` just anchors the cache fingerprint -> point it at any one member.
    - name: geotransolver_ensemble_surface
      inference_domain: surface
      checkpoint: *baseline_ckpt
      stats_path: *surface_stats
      kwargs:
        # Model-weights files (one per member); NOT the checkpoint.0.<epoch>.pt training state.
        member_checkpoints:
          - /path/to/run/checkpoints/GeoTransolver.0.96.mdlus
          - /path/to/run/checkpoints/GeoTransolver.0.97.mdlus
          - /path/to/run/checkpoints/GeoTransolver.0.98.mdlus
          - /path/to/run/checkpoints/GeoTransolver.0.99.mdlus
          - /path/to/run/checkpoints/GeoTransolver.0.100.mdlus
        batch_resolution: 60000
        geometry_sampling: 300000

  datasets:
    - name: drivaerstar
      root: /path/to/drivaerstar/surface_files/class_F/val
      # flip_wss_sign controls the wall-shear-stress sign convention. The adapter default (True)
      # negates DrivAerStar WSS to the DrivAerML convention; it is set False here because the
      # GeoTransolver checkpoints in this example were trained on the NATIVE DrivAerStar WSS sign
      # (the transformer_models pipeline). Match this to how YOUR checkpoints were trained — a
      # mismatch silently flips WSS, and therefore drag and lift, for every case.
      kwargs: { inference_domain: surface, flip_wss_sign: false }

  reproducibility:
    log_env: false
    save_artifacts: false

output:
  surface_interpolate_point_to_cell_for_metrics: true
  surface_metrics_idw_k: 5
  mesh_field_names:
    pressure: "pressure_pred"
    shear_stress: "wall_shear_stress_pred"
  ground_truth_mesh_field_names:
    pressure: "pressure_true"
    shear_stress: "wall_shear_stress_true"
  # Uncertainty companions on exported meshes (auto-derived as *Std / *EpistemicStd if omitted).
  std_mesh_field_names:
    pressure: "pressure_std"
    shear_stress: "wall_shear_stress_std"
  epistemic_std_mesh_field_names:
    pressure: "pressure_epistemic_std"
    shear_stress: "wall_shear_stress_epistemic_std"

metrics:
  # Deterministic (scored on the distribution mean for UQ wrappers).
  - l2_pressure
  - l2_shear_stress
  - l2_pressure_area_weighted
  # coeff (Cd prefactor 2/(A*rho*U^2)) + drag_direction are optional; drag_direction is shown
  # explicitly so the drag_uq panel below uses the SAME direction as the deterministic drag.
  - { name: drag, drag_direction: [1, 0, 0] }
  - lift
  # Pooled UQ reducer metrics (NaN for the deterministic row; finite for GP / sampling rows).
  - nlpd
  - nlpd_epistemic
  - calibration_zrms
  - coverage_95
  - sharpness_std
  - sharpness_epistemic_std
  # Per-point ranking quality: Spearman(|error|, uncertainty) within each geometry (higher=better).
  - uncertainty_error_spearman
  - uncertainty_error_spearman_epistemic
  # Sample-wise sparsification: rank geometries by aggregate uncertainty vs error (AUSE, lower=better).
  - sparsification_ause
  - sparsification_ause_epistemic
  # Decision-relevant drag sparsification: rank geometries by uncertainty propagated into the Cd
  # integral (drag std) vs |Cd_pred - Cd_true|. NOTE: this applies to BOTH analytic (GP) and
  # sampling (MC-Dropout / ensemble) rows, because drag_uq propagates the per-cell MARGINAL std the
  # engine produces for every method. That diagonal (per-cell independent) propagation is exact for
  # spatially-uncorrelated uncertainty but a lower bound for spatially-correlated (i.e. epistemic)
  # uncertainty — which dominates a coherent surface integral — so the drag-EPISTEMIC ranking is a
  # lower bound; read it alongside the field-level epistemic metrics.
  - { name: drag_uq, drag_direction: [1, 0, 0] }

reports:
  enabled: true
  save_comparison_meshes: false
  comparison_mesh_subdir: comparison_meshes
  # Only these cases write an inference_<model>_<case>.vtp (and drive report visuals); every other
  # case is still scored for metrics. Keep this short so large runs don't dump one VTP per case.
  visual_case_ids: ["00035", "00039"]
  # Sample-level sparsification figure per dataset (field panels from sparsification_ause + a Cd
  # panel from drag_uq), with the GP / MC-Dropout / ensemble models overlaid vs the oracle.
  visuals:
    - sparsification_plot
